<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Trend Radar</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0d1117;--card:#161b22;--border:#30363d;
      --text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;
      --green:#3fb950;--orange:#d2991d;--red:#f85149;
    }
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;min-height:100vh}
    header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:10}
    header h1{font-size:20px;display:flex;align-items:center;gap:8px}
    .badge{font-size:12px;background:var(--accent);color:#fff;padding:2px 8px;border-radius:10px}
    .container{max-width:900px;margin:0 auto;padding:20px 16px}
    .chart-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px}
    .chart-box h2{font-size:16px;margin-bottom:16px;color:var(--muted)}
    #growthChart{max-height:320px}
    .controls{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
    .chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-size:13px;transition:all .2s}
    .chip:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
    .chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px;transition:all .2s}
    .card:hover{border-color:var(--accent)}
    .card-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px}
    .card-title a{color:var(--accent);font-size:17px;font-weight:600;text-decoration:none}
    .card-title a:hover{text-decoration:underline}
    .card-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:6px;font-size:13px;color:var(--muted)}
    .tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500}
    .tag-ai{background:#1f2937;color:#60a5fa}.tag-tools{background:#1f2937;color:#f59e0b}
    .tag-infra{background:#1f2937;color:#34d399}.tag-front{background:#1f2937;color:#f472b6}
    .tag-back{background:#1f2937;color:#a78bfa}.tag-data{background:#1f2937;color:#f97316}
    .tag-sec{background:#1f2937;color:#ef4444}.tag-mob{background:#1f2937;color:#22d3ee}
    .tag-devops{background:#1f2937;color:#84cc16}.tag-learn{background:#1f2937;color:#fbbf24}
    .tag-other{background:#1f2937;color:#94a3b8}
    .growth{font-size:14px;font-weight:600}
    .growth-up{color:var(--green)}.growth-down{color:var(--red)}.growth-flat{color:var(--muted)}
    .score{display:flex;align-items:center;gap:4px;font-size:13px}
    .score-dot{width:8px;height:8px;border-radius:50%}
    .score-high{background:var(--green)}.score-mid{background:var(--orange)}.score-low{background:var(--red)}
    .summary{color:var(--text);font-size:14px;line-height:1.6;margin-top:10px}
    .footer{text-align:center;color:var(--muted);font-size:12px;padding:24px 0}
    .skeleton{height:64px;background:linear-gradient(90deg,var(--card) 25%,#1c232d 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:12px;margin-bottom:12px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  </style>
</head>
<body>
  <header>
    <h1>🤖 AI Trend Radar <span class="badge" id="timeBadge">loading…</span></h1>
  </header>
  <div class="container">
    <div class="chart-box" id="chartBox">
      <h2>📊 24h Star Growth</h2>
      <canvas id="growthChart"></canvas>
    </div>
    <div class="controls" id="filterBar"></div>
    <div id="feed"></div>
    <div class="footer">AI Trend Radar · GitHub Trending × AI Analysis</div>
  </div>
  <script src="app.js"></script>
</body>
</html>
