<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Trend Radar</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--muted:#8b949e;--accent:#58a6ff;--red:#f85149;--green:#3fb950;--orange:#d2991d;--ph:#da552f}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center}
h1{font-size:20px;display:flex;align-items:center;gap:8px}.badge{font-size:12px;padding:2px 8px;border-radius:12px}.gh{background:rgba(88,166,255,.15);color:var(--accent)}.ph{background:rgba(218,85,47,.15);color:var(--ph)}
.container{max-width:960px;margin:0 auto;padding:20px}#stats{display:flex;gap:16px;margin-bottom:20px}.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;flex:1;text-align:center}.stat-val{font-size:28px;font-weight:700}.stat-label{font-size:13px;color:var(--muted);margin-top:4px}
#chart-container{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:20px;max-height:320px}#chart-container h2{font-size:16px;margin-bottom:12px}
#filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}.filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);cursor:pointer;font-size:13px;transition:all .2s}.filter-btn.active,.filter-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:12px;transition:border-color .2s}.card:hover{border-color:var(--accent)}.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}.card-title{font-size:16px;font-weight:600}.card-title a{color:var(--accent);text-decoration:none}.card-title a:hover{text-decoration:underline}
.src-badge{font-size:11px;padding:1px 8px;border-radius:10px;font-weight:500;white-space:nowrap}.src-gh{background:rgba(88,166,255,.12);color:var(--accent)}.src-ph{background:rgba(218,85,47,.12);color:var(--ph)}
.card-summary{font-size:14px;color:var(--text);margin-bottom:8px;line-height:1.5}.card-meta{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted)}.score{color:var(--orange)}.growth-up{color:var(--green)}.tag{padding:2px 8px;border-radius:10px;font-size:11px;border:1px solid var(--border)}footer{text-align:center;padding:24px;color:var(--muted);font-size:12px}
</style>
</head>
<body>
<header><h1>📡 AI Trend Radar</h1><div><span id="updated"></span></div></header>
<div class="container">
<div id="stats"><div class="stat"><div class="stat-val" id="stat-total">-</div><div class="stat-label">今日收录</div></div><div class="stat"><div class="stat-val" id="stat-gh">-</div><div class="stat-label">🐙 GitHub</div></div><div class="stat"><div class="stat-val" id="stat-ph">-</div><div class="stat-label">🟠 ProductHunt</div></div></div>
<div id="chart-container"><h2>📊 综合评分 (0-10)</h2><canvas id="chart" height="80"></canvas></div>
<div id="filters"><button class="filter-btn active" onclick="filter('all')">全部</button><button class="filter-btn" onclick="filter('GitHub')">🐙 GitHub</button><button class="filter-btn" onclick="filter('ProductHunt')">🟠 ProductHunt</button></div>
<div id="list"></div>
</div>
<footer>Powered by GitHub Actions + AI · Updated every 6 hours</footer>
<script src="app.js"></script>
</body>
</html>
