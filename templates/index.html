<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AI Dev Feed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#000000">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: auto;
      padding: 16px;
      background: #0d1117;
      color: #c9d1d9;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 6px;
      color: #58a6ff;
    }
    .subtitle {
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 20px;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .score {
      background: #da3633;
      color: #fff;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: bold;
      white-space: nowrap;
    }
    .score.hot { background: #da3633; }
    .score.warm { background: #d29922; }
    .score.cool { background: #238636; }
    .card h3 {
      font-size: 17px;
      color: #58a6ff;
      margin-bottom: 6px;
    }
    .card h3 a {
      color: inherit;
      text-decoration: none;
    }
    .card h3 a:hover { text-decoration: underline; }
    .card .summary {
      font-size: 14px;
      line-height: 1.6;
      color: #c9d1d9;
      margin-bottom: 8px;
    }
    .card .meta {
      font-size: 12px;
      color: #8b949e;
    }
    .tag {
      display: inline-block;
      padding: 1px 8px;
      border: 1px solid #30363d;
      border-radius: 10px;
      margin-right: 6px;
    }
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #8b949e;
    }
  </style>
</head>
<body>
<h1>🔥 AI Dev Feed</h1>
<p class="subtitle">GitHub 热门项目 · AI 智能总结 · 每日更新</p>

{% if items %}
  {% for i in items %}
  <div class="card">
    <div class="card-header">
      <h3><a href="{{ i.url }}" target="_blank">{{ i.title }}</a></h3>
      <span class="score {% if i.score >= 8 %}hot{% elif i.score >= 6 %}warm{% else %}cool{% endif %}">⭐ {{ i.score }}</span>
    </div>
    <div class="summary">{{ i.summary }}</div>
    <div class="meta">
      <span class="tag">{{ i.category }}</span>
    </div>
  </div>
  {% endfor %}
{% else %}
  <div class="empty">⏳ 数据生成中，请稍候...</div>
{% endif %}

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js');
}
</script>
</body>
</html>
